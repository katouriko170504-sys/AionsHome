<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>设置</title>
<link rel="stylesheet" href="/static/common.css">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff8359">
</head>
<body>
<div class="sub-page">
  <div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅</button>
    <h2>⚙ 设置</h2>
  </div>
  <div class="page-content">
    <label class="form-label">Gemini API Key</label>
    <input class="form-input" type="text" id="geminiKeyInput" placeholder="输入 Gemini API Key..." autocomplete="off" style="font-family:monospace">
    <label class="form-label">Gemini Free Key（哨兵+向量）</label>
    <input class="form-input" type="text" id="geminiFreeKeyInput" placeholder="留空则复用上方 Key" autocomplete="off" style="font-family:monospace">

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">🛡 前置 & 哨兵模型（自定义中转站）</label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">留空则默认走 Gemini 官方 API + 上方 Free Key</p>
      <label class="form-label">API 地址（Base URL）</label>
      <input class="form-input" type="text" id="sentinelBaseUrlInput" placeholder="例：https://api.siliconflow.cn" autocomplete="off" style="font-family:monospace">
      <label class="form-label">API Key</label>
      <input class="form-input" type="text" id="sentinelApiKeyInput" placeholder="中转站 / 硅基流动的 API Key" autocomplete="off" style="font-family:monospace">
      <label class="form-label">模型名称</label>
      <input class="form-input" type="text" id="sentinelModelInput" placeholder="例：Qwen/Qwen3.6-35B-A3B" autocomplete="off" style="font-family:monospace">
    </div>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">📐 向量模型（记忆库 Embedding）</label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">留空则默认走 Gemini embedding-001。切换模型后维度可能不同，需重建向量（记忆库→手动总结）</p>
      <label class="form-label">API 地址（Base URL）</label>
      <input class="form-input" type="text" id="embeddingBaseUrlInput" placeholder="例：https://api.siliconflow.cn" autocomplete="off" style="font-family:monospace">
      <label class="form-label">API Key</label>
      <input class="form-input" type="text" id="embeddingApiKeyInput" placeholder="留空则复用 Gemini Free Key" autocomplete="off" style="font-family:monospace">
      <label class="form-label">模型名称</label>
      <input class="form-input" type="text" id="embeddingModelInput" placeholder="例：Qwen/Qwen3-Embedding-8B" autocomplete="off" style="font-family:monospace">
    </div>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">📱 手机屏幕监督</label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">Android App 可开启。MediaProjection 在线时优先用共享屏幕；无障碍开启后，可在共享掉线时继续截普通界面。</p>
      <p id="phoneScreenStatus" style="font-size:12px;color:#aaa;margin:2px 0 10px 0"></p>
      <div class="btn-row" style="justify-content:flex-start;margin-top:8px">
        <button class="btn-save" type="button" onclick="enablePhoneScreenSupervision()">共享授权</button>
        <button class="btn-save" type="button" onclick="openPhoneAccessibilitySettings()">无障碍设置</button>
        <button class="btn-save" type="button" onclick="testPhoneAccessibilityCapture()">测试截图</button>
        <button class="btn-cancel" type="button" onclick="disablePhoneScreenSupervision()">关闭</button>
      </div>
    </div>

    <label class="form-label">硅基流动 API Key</label>
    <input class="form-input" type="text" id="sfKeyInput" placeholder="输入硅基流动 API Key..." autocomplete="off" style="font-family:monospace">
    <label class="form-label">中转站 API Key</label>
    <input class="form-input" type="text" id="aiproKeyInput" placeholder="输入中转站 API Key..." autocomplete="off" style="font-family:monospace">

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">🔌 接入方管理</label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">管理 API 接入方和密钥。绿色 ● 表示已配置，红色 ● 表示未配置。</p>
      <div id="providerList" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">🤖 模型管理</label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">管理可用的模型。只有接入方已配置密钥的模型才会出现在聊天页的下拉菜单里。</p>
      <div id="modelList" style="display:flex;flex-direction:column;gap:6px"></div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05)">
        <label class="form-label">添加新模型</label>
        <div style="display:flex;flex-direction:column;gap:6px">
          <input class="form-input" type="text" id="newModelKey" placeholder="显示名称（如 Claude-Opus-4.6）" autocomplete="off">
          <select class="form-input" id="newModelProvider" style="background:#1a1a2e;color:#eee;border:1px solid rgba(255,255,255,0.15)"></select>
          <input class="form-input" type="text" id="newModelId" placeholder="模型ID（如 anthropic/claude-opus-4-6）" autocomplete="off" style="font-family:monospace">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#ccc">
            <input type="checkbox" id="newModelVision" style="width:16px;height:16px"> 支持视觉（图片）
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#ccc">
            <input type="checkbox" id="newModelThinking" style="width:16px;height:16px"> 🧠 支持思考（Extended Thinking）
          </label>
          <button class="btn-save" onclick="addModel()" style="align-self:flex-start">添加模型</button>
        </div>
      </div>
    </div>

    <label class="form-label">网易云 MUSIC_U Cookie（VIP 点歌）</label>
    <input class="form-input" type="text" id="neteaseMusicUInput" placeholder="浏览器 F12 → Cookie → MUSIC_U" autocomplete="off" style="font-family:monospace">

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <label class="form-label" style="font-size:15px;color:#ff8359">瑞幸咖啡 MCP</label>
      <label class="form-label" style="display:flex;align-items:center;gap:8px;font-size:13px">
        <input type="checkbox" id="luckinMcpEnabledInput" style="width:16px;height:16px">
        启用瑞幸咖啡下单能力
      </label>
      <p style="font-size:12px;color:#aaa;margin:2px 0 10px 0">支付仍由你确认；系统只创建待支付订单并返回支付链接或二维码。</p>
      <label class="form-label">MCP Token</label>
      <input class="form-input" type="text" id="luckinMcpTokenInput" placeholder="从瑞幸开放平台复制 Bearer Token" autocomplete="off" style="font-family:monospace">
      <label class="form-label">默认经度</label>
      <input class="form-input" type="text" id="luckinLongitudeInput" placeholder="例如 116.397128" autocomplete="off" style="font-family:monospace">
      <label class="form-label">默认纬度</label>
      <input class="form-input" type="text" id="luckinLatitudeInput" placeholder="例如 39.916527" autocomplete="off" style="font-family:monospace">
      <label class="form-label">默认门店关键词（可选）</label>
      <input class="form-input" type="text" id="luckinShopKeywordInput" placeholder="例如 写字楼名 / 商场名 / 门店名" autocomplete="off">
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='/'">取消</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>
<script src="/static/theme.js?v=theme-20260606"></script>
<script src="/static/common.js"></script>
<script>
connectCommonWS();

(async function init() {
  const s = await api("GET", "/api/settings");
  $("geminiKeyInput").value = s.gemini_key || "";
  $("geminiFreeKeyInput").value = s.gemini_free_key || "";
  $("sentinelBaseUrlInput").value = s.sentinel_base_url || "";
  $("sentinelApiKeyInput").value = s.sentinel_api_key || "";
  $("sentinelModelInput").value = s.sentinel_model || "";
  $("embeddingBaseUrlInput").value = s.embedding_base_url || "";
  $("embeddingApiKeyInput").value = s.embedding_api_key || "";
  $("embeddingModelInput").value = s.embedding_model || "";
  $("sfKeyInput").value = s.siliconflow_key || "";
  $("aiproKeyInput").value = s.aipro_key || "";
  $("neteaseMusicUInput").value = s.netease_music_u || "";
  $("luckinMcpEnabledInput").checked = !!s.luckin_mcp_enabled;
  $("luckinMcpTokenInput").value = s.luckin_mcp_token || "";
  $("luckinLongitudeInput").value = s.luckin_default_longitude || "";
  $("luckinLatitudeInput").value = s.luckin_default_latitude || "";
  $("luckinShopKeywordInput").value = s.luckin_default_shop_keyword || "";
  refreshPhoneScreenStatus();
  await loadProviders();
  await loadModels();
})();

async function saveSettings() {
  await api("PUT", "/api/settings", {
    gemini_key: $("geminiKeyInput").value.trim(),
    gemini_free_key: $("geminiFreeKeyInput").value.trim(),
    sentinel_base_url: $("sentinelBaseUrlInput").value.trim(),
    sentinel_api_key: $("sentinelApiKeyInput").value.trim(),
    sentinel_model: $("sentinelModelInput").value.trim(),
    embedding_base_url: $("embeddingBaseUrlInput").value.trim(),
    embedding_api_key: $("embeddingApiKeyInput").value.trim(),
    embedding_model: $("embeddingModelInput").value.trim(),
    siliconflow_key: $("sfKeyInput").value.trim(),
    aipro_key: $("aiproKeyInput").value.trim(),
    netease_music_u: $("neteaseMusicUInput").value.trim(),
    luckin_mcp_enabled: $("luckinMcpEnabledInput").checked,
    luckin_mcp_token: $("luckinMcpTokenInput").value.trim(),
    luckin_default_longitude: $("luckinLongitudeInput").value.trim(),
    luckin_default_latitude: $("luckinLatitudeInput").value.trim(),
    luckin_default_shop_keyword: $("luckinShopKeywordInput").value.trim()
  });
  showToast("✅ 已保存");
}

// ── 接入方管理 ──
async function loadProviders() {
  const providers = await api("GET", "/api/providers");
  const container = document.getElementById("providerList");
  if (!container) return;
  container.innerHTML = providers.filter(p => p.key_field).map(p => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px">
      <span style="color:${p.has_key ? '#4ade80' : '#f87171'};font-size:18px">●</span>
      <span style="flex:1;font-size:14px;color:#eee">${p.name}</span>
      <input class="form-input" type="text" id="pkey_${p.id}" placeholder="API Key..."
             style="flex:2;font-family:monospace;font-size:12px;margin:0" autocomplete="off">
      <button class="btn-save" style="padding:4px 12px;font-size:12px"
              onclick="saveProviderKey('${p.id}')">保存</button>
    </div>
  `).join("");
}

async function saveProviderKey(providerId) {
  const input = document.getElementById("pkey_" + providerId);
  if (!input) return;
  const key = input.value.trim();
  if (!key) { showToast("请输入 API Key"); return; }
  await api("PUT", "/api/providers/" + providerId + "/key", { key: key });
  input.value = "";
  showToast("✅ 已保存");
  await loadProviders();
}

// ── 模型管理 ──
async function loadModels() {
  const models = await api("GET", "/api/models");
  const providers = await api("GET", "/api/providers");
  const container = document.getElementById("modelList");
  const provSelect = document.getElementById("newModelProvider");
  if (!container) return;

  container.innerHTML = models.map(m => {
    const prov = providers.find(p => p.id === m.provider);
    const provName = prov ? prov.name : m.provider;
    const hasKey = prov ? prov.has_key : false;
    return `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:6px">
      <span style="color:${hasKey ? '#4ade80' : '#f87171'};font-size:12px">●</span>
      <span style="flex:1;font-size:13px;color:#eee">${m.key}</span>
      <span style="font-size:11px;color:#888">${provName}</span>
      <span style="font-size:11px;color:#666;font-family:monospace">${m.model}</span>
      ${m.vision ? '<span style="font-size:10px;color:#60a5fa">👁</span>' : ''}
      <span style="font-size:10px;color:${m.thinking ? '#b497d6' : '#555'};cursor:pointer" title="${m.thinking ? '思考模式已开' : '思考模式已关'}"
            onclick="toggleModelThinking('${m.key.replace(/'/g, "\\'")}', ${!m.thinking})">🧠</span>
      <button style="background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:2px 6px"
              onclick="deleteModel('${m.key.replace(/'/g, "\\'")}')">✕</button>
    </div>`;
  }).join("");

  if (provSelect) {
    provSelect.innerHTML = providers.map(p =>
      `<option value="${p.id}">${p.name}</option>`
    ).join("");
  }
}

async function addModel() {
  const key = document.getElementById("newModelKey").value.trim();
  const provider = document.getElementById("newModelProvider").value;
  const model = document.getElementById("newModelId").value.trim();
  const vision = document.getElementById("newModelVision").checked;
  const thinking = document.getElementById("newModelThinking").checked;
  if (!key || !model) { showToast("请填写名称和模型ID"); return; }
  const res = await api("POST", "/api/models", { key, provider, model, vision, thinking });
  if (res.error) { showToast("❌ " + res.error); return; }
  document.getElementById("newModelKey").value = "";
  document.getElementById("newModelId").value = "";
  document.getElementById("newModelVision").checked = false;
  document.getElementById("newModelThinking").checked = false;
  showToast("✅ 已添加");
  await loadModels();
}

async function deleteModel(key) {
  if (!confirm("确定删除模型 " + key + "？")) return;
  await api("DELETE", "/api/models/" + encodeURIComponent(key));
  showToast("✅ 已删除");
  await loadModels();
}

async function toggleModelThinking(key, val) {
  await api("PUT", "/api/models/" + encodeURIComponent(key), { thinking: val });
  showToast(val ? "🧠 思考模式已开启" : "🧠 思考模式已关闭");
  await loadModels();
}

function enablePhoneScreenSupervision() {
  const bridge = getPhoneScreenBridge();
  if (!bridge || !bridge.requestPermission) {
    showToast("需要在 Android App 里开启");
    return;
  }
  bridge.requestPermission();
}

function disablePhoneScreenSupervision() {
  const bridge = getPhoneScreenBridge();
  if (!bridge || !bridge.stop) {
    showToast("需要在 Android App 里关闭");
    return;
  }
  bridge.stop();
  refreshPhoneScreenStatus();
}

function openPhoneAccessibilitySettings() {
  const bridge = getPhoneScreenBridge();
  if (!bridge || !bridge.openAccessibilitySettings) {
    showToast("需要在 Android App 里开启");
    return;
  }
  bridge.openAccessibilitySettings();
}

function testPhoneAccessibilityCapture() {
  const bridge = getPhoneScreenBridge();
  if (!bridge) {
    showToast("需要在 Android App 里测试");
    return;
  }
  if (!bridge.testAccessibilityCapture) {
    showToast("Android App 版本太旧，请安装新版 APK");
    return;
  }
  bridge.testAccessibilityCapture();
}

function getPhoneScreenBridge() {
  if (window.AionPhoneScreen) return window.AionPhoneScreen;
  try {
    if (window.parent && window.parent !== window && window.parent.AionPhoneScreen) {
      return window.parent.AionPhoneScreen;
    }
  } catch (e) {}
  return null;
}

function refreshPhoneScreenStatus() {
  const el = $("phoneScreenStatus");
  if (!el) return;
  const bridge = getPhoneScreenBridge();
  if (!bridge) {
    el.textContent = "当前不在 Android App 内，手机截图能力不可用。";
    return;
  }
  let mediaProjection = false;
  let accessibility = false;
  try { mediaProjection = !!bridge.isEnabled?.(); } catch (e) {}
  try { accessibility = !!bridge.isAccessibilityEnabled?.(); } catch (e) {}
  el.textContent = `共享屏幕：${mediaProjection ? "已开启" : "未开启"} · 无障碍：${accessibility ? "已开启" : "未开启"}`;
}
</script>
</body>
</html>
